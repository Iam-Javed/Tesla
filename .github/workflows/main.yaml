name: CI workflow for tesla project

on:
  push:
    branches:
      - tesla-pipeline
  
  schedule:
    - cron: '9 9 * * *' # Runs every day at 9:09 AM UTC
  
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: build the image
        run: |
          docker build --file Docker/Dockerfile --tag tesla:v1.0.0 .

      - name: save the image as tar
        run: |
          docker save tesla:v1.0.0 -o tesla.tar
      
      - name: save the image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesla-image
          path: tesla.tar

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    environment: Production
    steps:
      - name: Load the image from artifact
        uses: actions/download-artifact@v4
        with:
          name: tesla-image
      - name: load the image into docker
        run: |
          docker load -i tesla.tar
      
      - name: Trivy scan for vulnerabilities
        uses: aquasecurity/trivy-action@v0.2.0
        with:
          scan-type: 'image'
          image-ref: tesla:v1.0.0
          format: 'json'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          vuln-type: 'os,library'
          output: 'trivy-report.json'

      - name: Upload Trivy report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  push:
    runs-on: ubuntu-latest
    needs: security_scan
    environment: Production
    steps:
      - name: Load the image from artifact
        uses: actions/download-artifact@v4
        with:
          name: tesla-image
      - name: load the image into docker
        run: |
          docker load -i tesla.tar
      
      - name: login into docker hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: push the image to docker hub
        run: |
          docker tag tesla:v1.0.0 ${{ secrets.DOCKER_USERNAME }}/tesla:v1.0.0
          docker push ${{ secrets.DOCKER_USERNAME }}/tesla:v1.0.0
